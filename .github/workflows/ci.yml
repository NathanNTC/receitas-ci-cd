name: Laravel CI/CD - Main

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    # IMPORTANTE: Mudado de ubuntu-latest para self-hosted para rodar na sua VM
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env
        run: cp .env.example .env

      - name: Gerar APP_KEY
        run: php artisan key:generate

      - name: Executar testes
        run: php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      # PASSO ADICIONADO: Atualiza o Docker na VM para a branch main
      - name: Executar comandos de Docker e Git na VM
        run: |
          cd /var/www/receitas/receitas-ci-cd
          git fetch origin
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build