name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar código na VM
        run: |
          cd /opt/receitas-ci-cd/prod

          echo "Atualizando código..."
          git fetch origin main
          git reset --hard origin/main

      - name: Subir containers
        run: |
          cd /opt/receitas-ci-cd/prod

          echo "Rebuild Docker..."
          sudo docker compose down -v
          sudo docker compose up -d --build

      - name: Esperar subir
        run: sleep 10

      - name: Migrations
        run: |
          sudo docker exec app_prod php artisan migrate --force

      - name: Cache Laravel
        run: |
          sudo docker exec app_prod php artisan config:cache
          sudo docker exec app_prod php artisan route:cache
          sudo docker exec app_prod php artisan view:cache