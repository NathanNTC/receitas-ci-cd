name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar código na VM
        run: |
          cd /opt/receitas-ci-cd/prod

          echo "Atualizando código..."
          git fetch origin
          git reset --hard origin/main

      - name: Instalar dependências
        run: |
          cd /opt/receitas-ci-cd/prod
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Subir containers
        run: |
          cd /opt/receitas-ci-cd/prod
          docker compose down
          docker compose up -d --build

      - name: Rodar migrations
        run: |
          docker exec app_prod php artisan migrate --force

      - name: Otimizar Laravel
        run: |
          docker exec app_prod php artisan config:cache
          docker exec app_prod php artisan route:cache
          docker exec app_prod php artisan view:cache