name: Deploy Produção

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir ambiente com Docker
        run: |
          cd /opt/receitas-ci-cd/prod
          git pull origin main
          sudo docker compose down
          sudo docker compose up -d --build