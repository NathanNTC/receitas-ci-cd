name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, sqlite, pdo_sqlite

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Preparar ambiente de teste
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Criar banco SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Rodar testes
        run: php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      # CORRIGIDO AQUI: Removeu o appleboy/ssh-action e usa apenas comandos de terminal diretos
      - name: Deploy na VM (Comandos locais)
        run: |
          cd /var/www/receitas/receitas-ci-cd
          git fetch origin
          git reset --hard origin/homolog
          docker compose down
          docker compose up -d --build