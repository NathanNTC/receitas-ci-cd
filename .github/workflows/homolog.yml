name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências (CI)
        run: composer install --no-interaction --prefer-dist

      - name: Preparar ambiente de teste
        run: |
          mkdir -p database
          touch database/database.sqlite

          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Rodar migrations + testes
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan migrate --force
          php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      # DEPLOY NA VM
      - name: Deploy na VM (Docker)
        run: |
          cd /opt/receitas-ci-cd/homolog

          git fetch origin
          git reset --hard origin/homolog

          sudo docker compose down
          sudo docker compose up -d --build

      - name: Aguardar MySQL
        run: |
          echo "Aguardando MySQL..."

          until sudo docker exec mysql_homolog mysqladmin ping -h localhost -uroot -proot --silent; do
            sleep 2
          done

          echo "MySQL pronto"

      - name: Migrar banco
        run: |
          sudo docker exec app_homolog php artisan migrate --force

      - name: Seed inicial (apenas se necessário)
        run: |
          sudo docker exec app_homolog php artisan db:seed --class=UserSeeder --force

      - name: Limpar cache Laravel
        run: |
          sudo docker exec app_homolog php artisan config:clear
          sudo docker exec app_homolog php artisan cache:clear
          sudo docker exec app_homolog php artisan route:clear
          sudo docker exec app_homolog php artisan view:clear