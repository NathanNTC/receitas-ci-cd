name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    # IMPORTANTE: Diz ao GitHub para rodar todos os passos dentro da sua VM Univates
    runs-on: self-hosted

    steps:
      - name: Checkout do código na VM
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Copiar .env
        run: cp .env.example .env

      - name: Gerar APP_KEY
        run: php artisan key:generate

      - name: Executar testes
        run: php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      # AGORA O DEPLOY RODA DIRETO VIA TERMINAL LOCAL DA VM:
      - name: Executar comandos de Docker e Git na VM
        run: |
          cd /var/www/receitas/receitas-ci-cd
          git fetch origin
          git reset --hard origin/homolog
          docker compose down
          docker compose up -d --build