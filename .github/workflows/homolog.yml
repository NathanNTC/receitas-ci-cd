name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, sqlite, pdo_sqlite

      - name: Instalar dependências (CI)
        run: composer install --no-interaction --prefer-dist

      - name: Criar SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Preparar .env
        run: |
          cp .env.example .env
          php artisan key:generate

          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env

          echo "CACHE_DRIVER=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

      - name: Rodar migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Rodar testes
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      # =========================
      # DEPLOY REAL HOMOLOGAÇÃO
      # =========================
      - name: Deploy homologação (subir ambiente)
        run: |
          cd /var/www/receitas/receitas-ci-cd

          echo "Atualizando código..."
          git fetch origin
          git reset --hard origin/homolog

          echo "Instalando dependências produção..."
          composer install --no-dev --optimize-autoloader

          echo "Rodando migrations produção..."
          php artisan migrate --force

          echo "Otimizando Laravel..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "Reiniciando cache/opcode (se existir PHP-FPM)"
          sudo -n systemctl reload php8.2-fpm || true
          sudo -n systemctl reload nginx || true