name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, sqlite, pdo_sqlite

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: Preparar ambiente de teste
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Criar banco SQLite
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Rodar testes
        run: php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      - name: Deploy na VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /var/www/receitas/receitas-ci-cd

            git fetch origin
            git reset --hard origin/homolog

            docker compose down
            docker compose up -d --build