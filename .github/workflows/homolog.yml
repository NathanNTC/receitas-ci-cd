name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      - name: Preparar ambiente de teste
        run: |
          mkdir -p database
          touch database/database.sqlite

          cp .env.example .env

          php artisan key:generate
          php artisan config:clear

      - name: Rodar migrations + testes
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan migrate --force
          php artisan test

      - name: Deploy Homolog
        run: |
          cd /opt/receitas-ci-cd/homolog

          git fetch origin
          git reset --hard origin/homolog

          sudo docker compose -f docker-compose.homolog.yml down || true
          sudo docker compose -f docker-compose.homolog.yml up -d --build

      - name: Aguardar MySQL
        run: sleep 20

      - name: Migrar banco
        run: |
          cd /opt/receitas-ci-cd/homolog
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan migrate --force

      - name: Seed inicial
        run: |
          cd /opt/receitas-ci-cd/homolog
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan db:seed --class=UserSeeder --force

      - name: Limpar cache Laravel
        run: |
          cd /opt/receitas-ci-cd/homolog
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan config:clear
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan cache:clear
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan route:clear
          sudo docker compose -f docker-compose.homolog.yml exec -T app php artisan view:clear