name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar código na VM
        run: |
          cd /opt/receitas-ci-cd/homolog

          echo "Atualizando código..."
          git fetch origin homolog
          git reset --hard origin/homolog

      - name: Rebuild Docker
        run: |
          cd /opt/receitas-ci-cd/homolog

          echo "Subindo ambiente limpo..."
          sudo docker compose down -v
          sudo docker compose up -d --build

      - name: Esperar subir containers
        run: sleep 10

      - name: Migrations
        run: |
          sudo docker exec app_homolog php artisan migrate --force

      - name: Cache Laravel (correto)
        run: |
          sudo docker exec app_homolog php artisan config:cache
          sudo docker exec app_homolog php artisan route:cache
          sudo docker exec app_homolog php artisan view:cache