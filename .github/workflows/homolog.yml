name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, sqlite, pdo_sqlite

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist

      # PASSO MOVIDO PARA CÁ: Cria o banco antes de qualquer comando do Laravel
      - name: Criar banco SQLite para o pipeline
        run: |
          mkdir -p database
          touch database/database.sqlite

      # Agora o config:clear não vai mais reclamar que o arquivo não existe
      - name: Preparar ambiente de teste
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          php artisan cache:clear

      - name: Rodar testes
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan migrate --force
          php artisan test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse app

      - name: Deploy na VM (Comandos locais)
        run: |
          cd /var/www/receitas/receitas-ci-cd
          git fetch origin
          git reset --hard origin/homolog
          docker compose down
          docker compose up -d --build